{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>parthiban.dev</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <link rel="stylesheet" href="{% static 'blog/main.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">parthiban.dev</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="{% url 'resume' %}">My Resume</a>
                    <a class="nav-link" href="{% url 'post-create' %}">Create Post</a>
                    <a class="nav-link" href="#" onclick="document.getElementById('logout-form').submit(); return false;">Logout</a>
                    <form id="logout-form" method="POST" action="{% url 'logout' %}" style="display:none;">
                    {% csrf_token %}
                    </form>
                {% else %}
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="{% url 'resume' %}">My Resume</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>

</body>
</html>
